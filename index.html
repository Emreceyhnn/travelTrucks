<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Secondary Meta Tags -->
    <title>TravelTrucks | Premium Camper & Expedition Truck Rental</title>
    <meta
      name="description"
      content="Discover freedom with TravelTrucks. Premium camper vans and rugged expedition trucks for your next adventure. Browse, filter, and book online."
    />
    <meta
      name="keywords"
      content="camper rental, expedition truck, traveltrucks, van life, luxury RV, overland rental"
    />
    <meta name="author" content="TravelTrucks" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://traveltrucks.com/" />
    <meta
      property="og:title"
      content="TravelTrucks | Premium Camper & Expedition Truck Rental"
    />
    <meta
      property="og:description"
      content="Discover freedom with TravelTrucks. Premium camper vans and rugged expedition trucks for your next adventure."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://traveltrucks.com/" />
    <meta
      property="twitter:title"
      content="TravelTrucks | Premium Camper & Expedition Truck Rental"
    />
    <meta
      property="twitter:description"
      content="Discover freedom with TravelTrucks. Premium camper vans and rugged expedition trucks for your next adventure."
    />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Performance: Preload LCP Image -->
    <link rel="preload" as="image" href="/bgImage.webp" fetchpriority="high" />

    <!-- Performance: Preconnect to Font Services -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SEO: JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RentalBusiness",
        "name": "TravelTrucks",
        "description": "Premium camper vans and rugged expedition trucks for your next adventure.",
        "url": "https://traveltrucks.com/",
        "logo": "https://traveltrucks.com/logo.png",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Kyiv",
          "addressCountry": "UA"
        },
        "priceRange": "$$"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
